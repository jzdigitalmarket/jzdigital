<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEM Artificial Intelligence Systems</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1a2b;
            overflow-x: hidden;
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.05));
            background-size: 400% 400%;
            animation: ripple 20s ease infinite;
            position: relative; 
        }

        /* Animações */
        @keyframes ripple { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }
        @keyframes slideIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        
        /* SIDEBARS */
        .sidebar {
            position: fixed;
            top: 0;
            width: 260px; 
            height: 100vh;
            z-index: 40; 
            background-color: rgba(26, 39, 57, 0.98); 
            backdrop-filter: blur(10px); 
            padding: 60px 15px 20px 15px; 
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-color: rgba(0, 191, 255, 0.3);
        }

        #sidebar-context { left: 0; border-right-width: 1px; }
        #sidebar-utility { right: 0; border-left-width: 1px; }

        /* Estados Fechados */
        .sidebar.closed-left { transform: translateX(-100%); opacity: 0; }
        .sidebar.closed-right { transform: translateX(100%); opacity: 0; }

        /* Área de Conteúdo Adaptável */
        .content-area {
            transition: padding 0.4s ease;
            padding-left: 280px;
            padding-right: 280px;
        }
        .content-area.no-left { padding-left: 60px; }
        .content-area.no-right { padding-right: 60px; }

        /* Botões de Toggle */
        .toggle-btn {
            position: fixed;
            top: 15px;
            z-index: 50;
            background: rgba(0, 191, 255, 0.2);
            color: #00bfff;
            border: 1px solid #00bfff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .toggle-btn:hover { background: #00bfff; color: #0d1a2b; }
        #btn-left { left: 15px; }
        #btn-right { right: 15px; }

        /* Widgets */
        .utility-widget {
            padding: 12px;
            border-radius: 8px;
            background-color: rgba(30, 41, 59, 0.5);
            border-top: 3px solid #333;
            color: white;
        }

        /* Calculadora Minimalista */
        .calc-btn {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            padding: 8px;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .calc-btn:hover { background: rgba(0, 191, 255, 0.3); }
        
        /* Robô e Greeting */
        #robot-container { position: absolute; top: 1%; left: 35%; transform: translateX(-50%); z-index: 30; width: 120px; transition: opacity 0.3s; }
        .robot-img { width: 100%; height: auto; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>

<body>

    <button id="btn-left" class="toggle-btn" onclick="toggleLeft()"><i class="fas fa-bars"></i></button>
    <button id="btn-right" class="toggle-btn" onclick="toggleRight()"><i class="fas fa-cog"></i></button>

    <aside id="sidebar-context" class="sidebar">
        <h2 class="text-sm font-bold text-cyan-400 uppercase tracking-widest border-b border-cyan-900 pb-2 mb-2">Contexto</h2>
        
        <div id="relogio-widget" class="text-2xl font-mono text-center text-cyan-400 py-2 bg-black/20 rounded">00:00:00</div>

        <div class="utility-widget" style="border-top-color: #00bfff;">
            <div id="calc-display" class="bg-black/40 p-2 text-right font-mono text-lg text-emerald-400 mb-2 rounded truncate">0</div>
            <div class="grid grid-cols-4 gap-1">
                <button onclick="cClear()" class="calc-btn text-red-400">C</button>
                <button onclick="cIn('/')" class="calc-btn">/</button>
                <button onclick="cIn('*')" class="calc-btn">×</button>
                <button onclick="cIn('-')" class="calc-btn">-</button>
                <button onclick="cIn('7')" class="calc-btn">7</button>
                <button onclick="cIn('8')" class="calc-btn">8</button>
                <button onclick="cIn('9')" class="calc-btn">9</button>
                <button onclick="cIn('+')" class="calc-btn">+</button>
                <button onclick="cIn('4')" class="calc-btn">4</button>
                <button onclick="cIn('5')" class="calc-btn">5</button>
                <button onclick="cIn('6')" class="calc-btn">6</button>
                <button onclick="cResult()" class="calc-btn bg-cyan-600/20 row-span-2">=</button>
                <button onclick="cIn('1')" class="calc-btn">1</button>
                <button onclick="cIn('2')" class="calc-btn">2</button>
                <button onclick="cIn('3')" class="calc-btn">3</button>
                <button onclick="cIn('0')" class="calc-btn col-span-2">0</button>
                <button onclick="cIn('.')" class="calc-btn">.</button>
            </div>
        </div>

        <div id="calendar-widget" class="utility-widget" style="border-top-color: #a3e635;">
            <div class="text-[10px] text-center text-gray-400 uppercase mb-2" id="current-month-year"></div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-[10px] text-center"></div>
        </div>
    </aside>

    <main class="content-area pt-10" id="main-content">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-white tracking-tighter">
                <span class="text-cyan-400">GEM</span> SYSTEMS
            </h1>
            <p class="text-gray-500 text-sm">Naturally Smart Solutions</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <a href="#" class="bg-gray-800/40 p-4 rounded-xl border border-gray-700 hover:border-cyan-500 transition-all group">
                <i class="fas fa-ship text-cyan-400 mb-2"></i>
                <h3 class="text-white font-bold">Porto Sem Papel</h3>
                <p class="text-gray-500 text-xs">Acessar Concentrador PSP</p>
            </a>
            </div>
    </main>

    <aside id="sidebar-utility" class="sidebar">
        <h2 class="text-sm font-bold text-orange-400 uppercase tracking-widest border-b border-orange-900 pb-2 mb-2">Utilidades</h2>
        
        <div class="utility-widget" style="border-top-color: #f59e0b;">
            <p class="text-xs font-bold mb-2">Notas Rápidas</p>
            <textarea id="quick-note" class="w-full h-32 bg-black/20 border-none rounded p-2 text-xs text-gray-300 resize-none focus:ring-1 focus:ring-orange-500" placeholder="Anotar algo..."></textarea>
        </div>

        <div class="utility-widget" style="border-top-color: #ef4444;">
            <p class="text-[10px] text-gray-500 uppercase">Sessão ID</p>
            <p id="session-id" class="text-[9px] font-mono text-gray-400 break-all">---</p>
        </div>
    </aside>

    <script>
        // --- Controle das Sidebars ---
        function toggleLeft() {
            const sb = document.getElementById('sidebar-context');
            const main = document.getElementById('main-content');
            sb.classList.toggle('closed-left');
            main.classList.toggle('no-left');
        }

        function toggleRight() {
            const sb = document.getElementById('sidebar-utility');
            const main = document.getElementById('main-content');
            sb.classList.toggle('closed-right');
            main.classList.toggle('no-right');
        }

        // --- Lógica da Calculadora ---
        const display = document.getElementById('calc-display');
        function cIn(v) { 
            if(display.innerText === '0') display.innerText = v;
            else display.innerText += v;
        }
        function cClear() { display.innerText = '0'; }
        function cResult() {
            try { 
                // Uso de Function é uma alternativa mais segura que eval direto
                display.innerText = new Function('return ' + display.innerText)(); 
            } catch { 
                display.innerText = 'Erro'; 
                setTimeout(cClear, 1000);
            }
        }

        // --- Relógio ---
        function updateTime() {
            const now = new Date();
            document.getElementById('relogio-widget').innerText = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateTime, 1000);

        // --- Inicialização ---
        window.onload = () => {
            updateTime();
            document.getElementById('session-id').innerText = crypto.randomUUID();
            // Renderizar calendário básico
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            document.getElementById('current-month-year').innerText = now.toLocaleString('pt-BR', {month:'long', year:'numeric'});
            for(let i=1; i<=31; i++) {
                const d = document.createElement('div');
                d.innerText = i;
                d.className = (i === now.getDate()) ? "text-cyan-400 font-bold" : "text-gray-600";
                grid.appendChild(d);
            }
        };
    </script>
</body>
</html>
