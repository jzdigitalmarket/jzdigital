<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkanoid JS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        canvas {
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 2px solid #333;
            border-radius: 5px;
            cursor: none; /* Esconde o mouse dentro do jogo */
        }
        #ui {
            margin-top: 15px;
            text-align: center;
        }
        button {
            background-color: #00ffff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #00cccc;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
        <p>Use o <b>Mouse</b> ou as setas <b>Esquerda/Direita</b> para mover.</p>
        <button id="startBtn">Iniciar Jogo</button>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");

    // --- Sistema de Áudio Procedural (Web Audio API) ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }
    const sndBounce = () => playTone(600, 'square', 0.1);
    const sndBrick = () => playTone(400, 'sawtooth', 0.1);
    const sndPowerup = () => playTone(800, 'sine', 0.3);
    const sndDie = () => playTone(150, 'square', 0.5);

    // --- Variáveis de Jogo ---
    let score = 0;
    let lives = 3;
    let highScore = localStorage.getItem("arkanoidHighScore") || 0;
    let isGameOver = false;
    let isPlaying = false;
    let animationId;

    // Bola
    let ball = { x: canvas.width / 2, y: canvas.height - 50, dx: 4, dy: -4, radius: 8, speed: 5 };
    
    // Paddle
    const paddleDefaultWidth = 100;
    let paddle = { x: canvas.width / 2 - 50, y: canvas.height - 20, width: paddleDefaultWidth, height: 10, speed: 7 };

    // Blocos
    const brickRowCount = 5;
    const brickColumnCount = 9;
    const brickWidth = 75;
    const brickHeight = 20;
    const brickPadding = 10;
    const brickOffsetTop = 50;
    const brickOffsetLeft = 20;
    let bricks = [];
    let powerups = [];

    const colors = ["#ff0055", "#ffaa00", "#00ffaa", "#00aaff", "#aa00ff"];

    function initBricks() {
        bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1, color: colors[r % colors.length] };
            }
        }
    }

    // --- Controles ---
    let rightPressed = false;
    let leftPressed = false;

    document.addEventListener("keydown", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
    });
    document.addEventListener("keyup", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    });
    document.addEventListener("mousemove", (e) => {
        const relativeX = e.clientX - canvas.getBoundingClientRect().left;
        if (relativeX > 0 && relativeX < canvas.width) {
            paddle.x = relativeX - paddle.width / 2;
        }
    });

    // --- Lógica de Jogo ---
    function spawnPowerup(x, y) {
        if (Math.random() < 0.15) { // 15% de chance de dropar um powerup
            const type = Math.random() < 0.5 ? 'expand' : 'life';
            powerups.push({ x: x, y: y, dy: 3, type: type, radius: 10 });
        }
    }

    function collisionDetection() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score += 10;
                        sndBrick();
                        spawnPowerup(b.x + brickWidth / 2, b.y + brickHeight / 2);

                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem("arkanoidHighScore", highScore);
                        }

                        // Aumenta a velocidade levemente a cada 50 pontos
                        if (score % 50 === 0) {
                            ball.dx += (ball.dx > 0 ? 0.5 : -0.5);
                            ball.dy += (ball.dy > 0 ? 0.5 : -0.5);
                        }
                    }
                }
            }
        }
    }

    function updatePowerups() {
        for (let i = 0; i < powerups.length; i++) {
            let p = powerups[i];
            p.y += p.dy;

            // Colisão com o paddle
            if (p.y + p.radius > paddle.y && p.y - p.radius < paddle.y + paddle.height && p.x > paddle.x && p.x < paddle.x + paddle.width) {
                sndPowerup();
                if (p.type === 'expand') {
                    paddle.width = Math.min(paddle.width + 40, canvas.width / 2); // Limita o tamanho máximo
                } else if (p.type === 'life') {
                    lives++;
                }
                powerups.splice(i, 1);
                i--;
            } else if (p.y > canvas.height) {
                powerups.splice(i, 1);
                i--;
            }
        }
    }

    // --- Renderização ---
    function drawBall() {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        ctx.beginPath();
        ctx.rect(paddle.x, paddle.y, paddle.width, paddle.height);
        ctx.fillStyle = "#00ffff";
        ctx.fill();
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00ffff";
        ctx.closePath();
        ctx.shadowBlur = 0; // Reseta sombra
    }

    function drawBricks() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                if (bricks[c][r].status === 1) {
                    let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                    let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, brickHeight);
                    ctx.fillStyle = bricks[c][r].color;
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function drawPowerups() {
        for (let p of powerups) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.type === 'expand' ? '#00ff00' : '#00aaff'; // Verde p/ expandir, Azul p/ vida
            ctx.fill();
            ctx.closePath();
            
            // Desenha um ícone simples dentro
            ctx.fillStyle = "#000";
            ctx.font = "12px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(p.type === 'expand' ? "<>" : "♥", p.x, p.y);
        }
    }

    function drawUI() {
        ctx.font = "16px 'Segoe UI'";
        ctx.fillStyle = "#fff";
        ctx.textAlign = "left";
        ctx.fillText("Score: " + score, 20, 25);
        ctx.textAlign = "center";
        ctx.fillText("High Score: " + highScore, canvas.width / 2, 25);
        ctx.textAlign = "right";
        ctx.fillText("Vidas: " + lives, canvas.width - 20, 25);
    }

    function resetLevel() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height - 50;
        ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
        ball.dy = -4;
        paddle.x = (canvas.width - paddle.width) / 2;
        paddle.width = paddleDefaultWidth; // Reseta powerups
        powerups = [];
    }

    function draw() {
        if (!isPlaying) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBricks();
        drawBall();
        drawPaddle();
        drawPowerups();
        drawUI();
        collisionDetection();
        updatePowerups();

        // Movimento da bola
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Colisão com paredes laterais
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
            ball.dx = -ball.dx;
            sndBounce();
        }
        // Colisão com teto
        if (ball.y + ball.dy < ball.radius) {
            ball.dy = -ball.dy;
            sndBounce();
        } 
        // Lógica da base (Paddle ou Game Over)
        else if (ball.y + ball.dy > canvas.height - ball.radius - paddle.height) {
            if (ball.x > paddle.x && ball.x < paddle.x + paddle.width && ball.y < paddle.y + paddle.height) {
                // Controle do ângulo baseado em onde bate na raquete
                let hitPoint = ball.x - (paddle.x + paddle.width / 2);
                ball.dx = hitPoint * 0.15;
                ball.dy = -ball.dy;
                sndBounce();
            } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                lives--;
                sndDie();
                if (!lives) {
                    gameOver();
                    return;
                } else {
                    resetLevel();
                }
            }
        }

        // Movimento do Paddle por teclado
        if (rightPressed && paddle.x < canvas.width - paddle.width) {
            paddle.x += paddle.speed;
        } else if (leftPressed && paddle.x > 0) {
            paddle.x -= paddle.speed;
        }

        // Condição de Vitória
        let activeBricks = bricks.flat().filter(b => b.status === 1).length;
        if (activeBricks === 0) {
            ctx.font = "40px Arial";
            ctx.fillStyle = "#00ffaa";
            ctx.textAlign = "center";
            ctx.fillText("VOCÊ VENCEU!", canvas.width / 2, canvas.height / 2);
            isPlaying = false;
            startBtn.style.display = "inline-block";
            startBtn.innerText = "Jogar Novamente";
            return;
        }

        animationId = requestAnimationFrame(draw);
    }

    function gameOver() {
        isPlaying = false;
        ctx.font = "40px Arial";
        ctx.fillStyle = "#ff0055";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        startBtn.style.display = "inline-block";
        startBtn.innerText = "Tentar Novamente";
    }

    function startGame() {
        initAudio();
        score = 0;
        lives = 3;
        isGameOver = false;
        isPlaying = true;
        startBtn.style.display = "none";
        initBricks();
        resetLevel();
        cancelAnimationFrame(animationId);
        draw();
    }

    startBtn.addEventListener("click", startGame);

    // Desenha a tela inicial
    ctx.font = "30px 'Segoe UI'";
    ctx.fillStyle = "#555";
    ctx.textAlign = "center";
    ctx.fillText("Pressione Iniciar Jogo", canvas.width / 2, canvas.height / 2);

</script>
</body>
</html>
