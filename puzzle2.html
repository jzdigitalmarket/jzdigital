<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Slide Puzzle</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #e9ecef; }
        #board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 2px; margin: 20px auto; width: 304px; border: 5px solid #333; }
        .tile { width: 100px; height: 100px; background-image: url('https://picsum.photos/300/300'); background-size: 300px 300px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; }
        .empty { background: #ccc; cursor: default; }
    </style>
</head>
<body>
    <h1>Quebra-cabeça Deslizante</h1>
    <div id="board"></div>
    <button onclick="shuffle()">Embaralhar</button>

    <script>
        const board = document.getElementById('board');
        let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8]; // 8 é o vazio

        function render() {
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = 'tile' + (tile === 8 ? ' empty' : '');
                if (tile !== 8) {
                    const x = (tile % 3) * 100;
                    const y = Math.floor(tile / 3) * 100;
                    div.style.backgroundPosition = `-${x}px -${y}px`;
                }
                div.onclick = () => move(index);
                board.appendChild(div);
            });
        }

        function move(index) {
            const emptyIndex = tiles.indexOf(8);
            const validMoves = [index-1, index+1, index-3, index+3];
            
            // Impede movimento lateral entre linhas diferentes
            const isLateralMap = (Math.abs(index - emptyIndex) === 1);
            const sameRow = Math.floor(index / 3) === Math.floor(emptyIndex / 3);

            if (validMoves.includes(emptyIndex) && (isLateralMap ? sameRow : true)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                render();
            }
        }

        function shuffle() {
            tiles.sort(() => Math.random() - 0.5);
            render();
        }

        render();
    </script>
</body>
</html>
