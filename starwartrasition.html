<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 3rem;
            color: white;
        }

        /* Cena 1 (Fundo) */
        #scene1 {
            background: url('https://picsum.photos/id/10/1920/1080') no-repeat center/cover;
            z-index: 1;
        }

        /* Cena 2 (A que entra varrendo) */
        #scene2 {
            background: url('https://picsum.photos/id/28/1920/1080') no-repeat center/cover;
            z-index: 2;
            /* Começa escondida à direita */
            clip-path: inset(0 0 0 100%); 
            transition: clip-path 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Classe que ativa a transição */
        #scene2.active {
            clip-path: inset(0 0 0 0%);
        }

        button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 15px 30px;
            cursor: pointer;
            background: #ffc909;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button onclick="changeScene()">Mudar Cena</button>

    <div id="scene1" class="scene">CENA A</div>
    <div id="scene2" class="scene">CENA B</div>

    <script>
        function changeScene() {
            document.getElementById('scene2').classList.toggle('active');
        }
    </script>

</body>
</html>
