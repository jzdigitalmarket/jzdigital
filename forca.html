<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Forca</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 50px; }
        #word-display { font-size: 2em; letter-spacing: 10px; margin: 20px; }
        .keyboard { display: grid; grid-template-columns: repeat(9, 40px); gap: 5px; justify-content: center; }
        button { padding: 10px; cursor: pointer; }
        #message { color: red; font-weight: bold; margin-top: 20px; }
        #hangman-svg { background: #eee; border-radius: 50%; }
    </style>
</head>
<body>
    <h1>Forca</h1>
    <svg id="hangman-svg" width="150" height="150" viewBox="0 0 100 100">
        <!-- Estrutura básica -->
        <line x1="20" y1="90" x2="80" y2="90" stroke="black" />
        <line x1="30" y1="90" x2="30" y2="10" stroke="black" />
        <line x1="30" y1="10" x2="70" y2="10" stroke="black" />
        <line x1="70" y1="10" x2="70" y2="25" stroke="black" />
        <!-- Partes do corpo (escondidas inicialmente) -->
        <circle id="p0" cx="70" cy="35" r="10" fill="none" stroke="black" opacity="0" />
        <line id="p1" x1="70" y1="45" x2="70" y2="70" stroke="black" opacity="0" />
        <line id="p2" x1="70" y1="50" x2="55" y2="60" stroke="black" opacity="0" />
        <line id="p3" x1="70" y1="50" x2="85" y2="60" stroke="black" opacity="0" />
        <line id="p4" x1="70" y1="70" x2="55" y2="85" stroke="black" opacity="0" />
        <line id="p5" x1="70" y1="70" x2="85" y2="85" stroke="black" opacity="0" />
    </svg>

    <div id="word-display">_ _ _ _ _</div>
    <div class="keyboard" id="keyboard"></div>
    <div id="message"></div>

    <script>
        const words = ["JAVASCRIPT", "LOGICA", "PROGRAMADOR", "FRONTEND", "TECLADO"];
        let selectedWord = words[Math.floor(Math.random() * words.length)];
        let guessedLetters = [];
        let mistakes = 0;

        function updateDisplay() {
            const display = selectedWord.split('').map(l => guessedLetters.includes(l) ? l : "_").join(' ');
            document.getElementById('word-display').innerText = display;
            
            if (!display.includes("_")) {
                document.getElementById('message').innerText = "VENCEU!";
                disableAll();
            }
        }

        function guess(letter, btn) {
            btn.disabled = true;
            if (selectedWord.includes(letter)) {
                guessedLetters.push(letter);
            } else {
                document.getElementById(`p${mistakes}`).setAttribute('opacity', '1');
                mistakes++;
            }
            
            if (mistakes === 6) {
                document.getElementById('message').innerText = "FIM DE JOGO! A palavra era: " + selectedWord;
                disableAll();
            }
            updateDisplay();
        }

        function disableAll() {
            document.querySelectorAll('.keyboard button').forEach(b => b.disabled = true);
        }

        const keyboard = document.getElementById('keyboard');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
            const btn = document.createElement('button');
            btn.innerText = l;
            btn.onclick = () => guess(l, btn);
            keyboard.appendChild(btn);
        });

        updateDisplay();
    </script>
</body>
</html>
